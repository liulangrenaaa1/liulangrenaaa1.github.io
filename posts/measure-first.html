    <h1>Measure First：性能优化前必须做的 5 件事</h1>
    <p class="meta">2026-04-16 · 工程方法</p>
    <div class="card">
      <ol>
        <li>定义指标：启动时延、掉帧率、CPU 占用、功耗</li>
        <li>建立基线：至少 10 次样本，保留方差</li>
        <li>固定变量：环境、温度、负载、系统状态</li>
        <li>设计实验：一次只改一个因素</li>
        <li>自动回归：避免“优化一次，退化一片”</li>
      </ol>
      <p>优化不是玄学，是可复现的工程实验。</p>
    </div>
  </main>
